workerPoolSpecs:
  - machineSpec:
      machineType: g2-standard-4
      acceleratorType: NVIDIA_L4
      acceleratorCount: 1
    replicaCount: 1
    diskSpec:
      bootDiskType: pd-ssd
      bootDiskSizeGb: 100
    containerSpec:
      imageUri: docker.io/iman1121/iman-kunwar-genai:vertex-smoke-loop
      command:
        - python
        - /app/scripts/vertex_job_runner.py
      args:
        - --
        - python
        - /app/run_loop.py
      env:
        - name: VERTEX_RESULTS_GCS_URI
          value: gs://genai-1010101/obfuscation-prompting
        - name: VERTEX_EXPERIMENT_NAME
          value: vertex-smoke-test
        - name: VERTEX_DISPLAY_NAME
          value: vertex-smoke-test-l4
        - name: VERTEX_IMAGE_URI
          value: docker.io/iman1121/iman-kunwar-genai:vertex-smoke-loop
        - name: SMOKE_STEPS
          value: "3"
        - name: SMOKE_SLEEP_SECONDS
          value: "1"
